  <style>#gojo-btn{position:fixed;bottom:20px;right:20px;width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#4A90D9,#6C3CE1);border:none;cursor:pointer;box-shadow:0 4px 20px rgba(74,144,217,0.5);z-index:9999;font-size:30px;transition:transform 0.2s}#gojo-btn:hover{transform:scale(1.1)}#gojo-frame{display:none;position:fixed;bottom:95px;right:20px;width:380px;height:600px;border:none;border-radius:16px;box-shadow:0 8px 30px rgba(0,0,0,0.4);z-index:9999}#gojo-close{display:none;position:fixed;bottom:700px;right:20px;background:#ff4757;color:#fff;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;z-index:10000;font-size:14px}</style><button id="gojo-btn" onclick="toggleGojo()">😎</button><button id="gojo-close" onclick="toggleGojo()">✕</button><iframe id="gojo-frame" src="https://gojo-agent.vercel.app"></iframe><script>function toggleGojo(){var f=document.getElementById("gojo-frame"),b=document.getElementById("gojo-close");var show=f.style.display==="none"||!f.style.display;f.style.display=show?"block":"none";b.style.display=show?"block":"none"}</script></body>
